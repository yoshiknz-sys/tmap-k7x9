// ---- symlog目盛り候補 ----
const TICK_CANDS = [-100,-50,-30,-20,-15,-10,-5,-3,-2,-1,0,1,2,3,5,10,15,20,30,50,100];
const sl = v => Math.sign(v)*Math.log10(1+Math.abs(v));

// 表示中の点群からレンジと目盛りを決める
function fitRange(pts, key){
  let lo = Math.min(...pts.map(d=>d[key]));
  let hi = Math.max(...pts.map(d=>d[key]));
  const pad = Math.max(0.06, (hi-lo)*0.14);
  lo -= pad; hi += pad;
  if(hi - lo < 0.5){ const c=(hi+lo)/2; lo=c-0.25; hi=c+0.25; }   // 過剰ズーム防止
  // 目盛り: レンジ内の候補を選び、多すぎたら間引く
  let tv = TICK_CANDS.filter(v => sl(v)>=lo && sl(v)<=hi);
  if(tv.length > 8) tv = tv.filter(v => ![2,-2,3,-3,15,-15].includes(v));
  if(tv.length > 8) tv = tv.filter(v => v%5===0 || v===0 || Math.abs(v)===1);
  return {range:[lo,hi], vals:tv.map(sl), text:tv.map(v=>v? (v>0?"+":"")+v+"%" : "0%")};
}

  const dx=(xr[1]-xr[0])*0.13, dy=(yr[1]-yr[0])*0.05;
  const kept=[];
  const order=S.map((d,i)=>i).sort((a,b)=>S[b].n-S[a].n);
  const show=new Array(S.length).fill(false);
  for(const i of order){
    const d=S[i];
    if(!kept.some(k=>Math.abs(k.x-d.x)<dx && Math.abs(k.y-d.y)<dy)){
      show[i]=true; kept.push(d);
    }
  }
  return S.map((d,i)=>show[i]?d.sector:"");
}

// ---- 個別銘柄ラベル: 上位N(原点からの距離)のみ + 近接間引き ----
function stockLabels(rows, xr, yr){
  if(showAllLabels) return rows.map(d=>d.name);
  const dx=(xr[1]-xr[0])*0.16, dy=(yr[1]-yr[0])*0.05;
  const order=rows.map((d,i)=>i)
    .sort((a,b)=>(Math.abs(rows[b].r3m)+Math.abs(rows[b].r5)*3)-(Math.abs(rows[a].r3m)+Math.abs(rows[a].r5)*3));
  const kept=[]; const show=new Array(rows.length).fill(false);
  for(const i of order){
    if(kept.length>=LABEL_TOP_N) break;
    const d=rows[i];
    if(!kept.some(k=>Math.abs(k.x-d.x)<dx && Math.abs(k.y-d.y)<dy)){
      show[i]=true; kept.push(d);
    }
  }
  return rows.map((d,i)=>show[i]?d.name:"");
}

function makeLayout(xr, yr, xt, yt, dateStamp){
  const shapes=[];
  const clip=(v,r)=>Math.max(r[0],Math.min(r[1],v));
  // 象限背景(レンジ内にある部分だけ)
  if(xr[1]>0&&yr[1]>0) shapes.push({type:"rect",x0:Math.max(0,xr[0]),x1:xr[1],y0:Math.max(0,yr[0]),y1:yr[1],fillcolor:"rgba(61,220,132,0.06)",line:{width:0},layer:"below"});
  if(xr[0]<0&&yr[1]>0) shapes.push({type:"rect",x0:xr[0],x1:Math.min(0,xr[1]),y0:Math.max(0,yr[0]),y1:yr[1],fillcolor:"rgba(67,200,232,0.05)",line:{width:0},layer:"below"});
  if(xr[0]<0&&yr[0]<0) shapes.push({type:"rect",x0:xr[0],x1:Math.min(0,xr[1]),y0:yr[0],y1:Math.min(0,yr[1]),fillcolor:"rgba(255,93,115,0.05)",line:{width:0},layer:"below"});
  if(xr[1]>0&&yr[0]<0) shapes.push({type:"rect",x0:Math.max(0,xr[0]),x1:xr[1],y0:yr[0],y1:Math.min(0,yr[1]),fillcolor:"rgba(242,201,76,0.05)",line:{width:0},layer:"below"});
  if(xr[0]<0&&xr[1]>0) shapes.push({type:"line",x0:0,x1:0,y0:yr[0],y1:yr[1],line:{color:"#3a4754",width:1}});
  if(yr[0]<0&&yr[1]>0) shapes.push({type:"line",x0:xr[0],x1:xr[1],y0:0,y1:0,line:{color:"#3a4754",width:1}});

  const ql=[];
  const addq=(x,y,t,c,xa,ya)=>ql.push({x,y,text:t,showarrow:false,xanchor:xa,yanchor:ya,font:{color:c,size:14},opacity:0.85});
  if(xr[1]>0&&yr[1]>0) addq(xr[1]-0.02,yr[1]-0.02,"リーダー","#3ddc84","right","top");
  if(xr[0]<0&&yr[1]>0) addq(xr[0]+0.02,yr[1]-0.02,"短期反発","#43c8e8","left","top");
  if(xr[0]<0&&yr[0]<0) addq(xr[0]+0.02,yr[0]+0.02,"弱","#ff5d73","left","bottom");
  if(xr[1]>0&&yr[0]<0) addq(xr[1]-0.02,yr[0]+0.02,"調整","#f2c94c","right","bottom");
  ql.push({x:(xr[0]+xr[1])/2,y:yr[0]+(yr[1]-yr[0])*0.42,text:dateStamp,showarrow:false,
           font:{color:"#232d38",size:36},opacity:0.9});

  return {
    paper_bgcolor:"#0d1117", plot_bgcolor:"#0f151c",
    margin:{l:48, r:12, t:8, b:46},
    xaxis:{title:{text:"【長期】3ヶ月リターン",font:{size:12,color:"#7f8ea0"}},
           range:xr, tickvals:xt.vals, ticktext:xt.text, zeroline:false,
           gridcolor:"#1b232d", tickfont:{size:11,color:"#7f8ea0"}, fixedrange:true},
    yaxis:{title:{text:"【短期】5日リターン",font:{size:12,color:"#7f8ea0"}},
           range:yr, tickvals:yt.vals, ticktext:yt.text, zeroline:false,
           gridcolor:"#1b232d", tickfont:{size:11,color:"#7f8ea0"}, fixedrange:true},
    shapes, annotations:ql,
    showlegend:false, dragmode:false, hoverlabel:{font:{size:13}},
  };
}

const chart = document.getElementById("chart");
const config = {displayModeBar:false, responsive:true, scrollZoom:false};
const $ = id => document.getElementById(id);

function sectorColor(snap, name){
  const s = snap.sectors.find(d=>d.sector===name);
  return s ? s.color : "#6fc3ff";
}

function render(){
  const snap = SNAPSHOTS[ti];
  $("asof").textContent = snap.asof_full;
  let traces, titleText, pts;

  if(filter === "all" && drill === null){
    const S = snap.sectors;
    pts = S;
    const xt = fitRange(S,"x"), yt = fitRange(S,"y");
    traces = [{
      type:"scatter", mode:"markers+text",
      x:S.map(d=>d.x), y:S.map(d=>d.y),
      text:thinSectorLabels(S, xt.range, yt.range),
      textposition:"top center", textfont:{size:11.5, color:S.map(d=>d.color)},
      marker:{size:S.map(d=>Math.max(12, 7+Math.sqrt(d.n)*3.4)),
              color:S.map(d=>d.color), opacity:0.85, line:{color:"#0d1117", width:1.5}},
      customdata:S.map(d=>[d.sector, d.n, d.r3m, d.r5]),
      hovertemplate:"<b>%{customdata[0]}</b>（%{customdata[1]}銘柄）<br>"+
                    "3ヶ月: %{customdata[2]}%　5日: %{customdata[3]}%<extra></extra>",
    }];
    titleText = "業種をタップすると個別銘柄を表示";
    $("back").style.display = "none";
    Plotly.react(chart, traces, makeLayout(xt.range, yt.range, xt, yt, snap.asof), config);
  }else{
    let rows;
    if(drill !== null){
      rows = snap.stocks.filter(d=>d.sector===drill);
      if(filter !== "all") rows = rows.filter(FILTERS[filter]);
      titleText = drill + "（" + rows.length + "銘柄）" +
                  (filter!=="all" ? "・" + FILTER_LABEL[filter] : "");
      $("back").style.display = "inline-block";
    }else{
      rows = snap.stocks.filter(FILTERS[filter]);
      titleText = FILTER_LABEL[filter] + "該当 " + rows.length + "銘柄・点をタップで銘柄名";
      $("back").style.display = "none";
    }
    if(rows.length === 0){
      titleText += "（該当なし）";
      Plotly.react(chart, [], makeLayout([-1,1],[-1,1],
        {vals:[],text:[]},{vals:[],text:[]}, snap.asof), config);
      $("title").textContent = titleText; updateButtons(); return;
    }
    const xt = fitRange(rows,"x"), yt = fitRange(rows,"y");
    traces = [{
      type:"scatter", mode:"markers+text",
      x:rows.map(d=>d.x), y:rows.map(d=>d.y),
      text:stockLabels(rows, xt.range, yt.range),
      textposition:"top center", textfont:{size:10.5, color:"#c7d3de"},
      marker:{size:11, opacity:0.9, line:{color:"#0d1117", width:1},
              color:rows.map(d=>sectorColor(snap, d.sector))},
      customdata:rows.map(d=>[d.name, d.code, d.sector, d.r3m, d.r5]),
      hovertemplate:"<b>%{customdata[0]}</b>（%{customdata[1]}・%{customdata[2]}）<br>"+
                    "3ヶ月: %{customdata[3]}%　5日: %{customdata[4]}%<extra></extra>",
    }];
    Plotly.react(chart, traces, makeLayout(xt.range, yt.range, xt, yt, snap.asof), config);
  }
  $("title").textContent = titleText;
  updateButtons();
}

function updateButtons(){
  const snap = SNAPSHOTS[ti];
  document.querySelectorAll("#timerow .t").forEach((b,i)=>
    b.classList.toggle("on", i===ti));
  document.querySelectorAll("#filterrow .f").forEach(b=>{
    const k = b.dataset.k;
    const n = k==="all" ? "" :
      "（" + snap.stocks.filter(FILTERS[k]).length + "）";
    b.textContent = FILTER_LABEL[k] + n;
    b.classList.toggle("on", k===filter);
  });
  $("lbl").classList.toggle("on", showAllLabels);
}

SNAPSHOTS.forEach((s,i)=>{
  const b = document.createElement("button");
  b.className = "pill t"; b.textContent = s.label;
  b.onclick = ()=>{ stopPlay(); ti=i; render(); };
  $("timerow").appendChild(b);
});
const playBtn = document.createElement("button");
playBtn.className = "pill play"; playBtn.textContent = "▶";
playBtn.onclick = ()=>{ playing ? stopPlay() : startPlay(); };
$("timerow").appendChild(playBtn);

function startPlay(){
  playBtn.textContent = "■"; ti = 0; render();
  playing = setInterval(()=>{
    ti++;
    if(ti >= SNAPSHOTS.length){ stopPlay(); ti = SNAPSHOTS.length-1; }
    render();
  }, 900);
}
function stopPlay(){
  if(playing){ clearInterval(playing); playing = null; }
  playBtn.textContent = "▶";
}

Object.keys(FILTERS).forEach(k=>{
  const b = document.createElement("button");
  b.className = "pill f"; b.dataset.k = k;
  b.onclick = ()=>{ stopPlay(); filter=k; drill=null; render(); };
  $("filterrow").appendChild(b);
});
const lblBtn = document.createElement("button");
lblBtn.className = "pill"; lblBtn.id = "lbl"; lblBtn.textContent = "ラベル";
lblBtn.onclick = ()=>{ showAllLabels = !showAllLabels; render(); };
$("filterrow").appendChild(lblBtn);

$("back").onclick = ()=>{ drill=null; render(); };
render();

chart.on("plotly_click", ev=>{
  if(!(filter==="all" && drill===null) || !ev.points.length) return;
  drill = ev.points[0].customdata[0];
  render();
});
</script>
</body>
